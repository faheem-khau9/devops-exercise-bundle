# Default values for the sample-app chart.
# DO NOT MODIFY this file. Override values in your env-specific values.*.yaml.

image:
  repository: traefik/whoami
  tag: v1.10.4
  pullPolicy: IfNotPresent

replicaCount: 1

# Port the container listens on internally. Kept at 8080 so the app runs as
# non-root without needing NET_BIND_SERVICE. The Service still exposes port 80
# and maps it to this containerPort via the named "http" port.
containerPort: 8080

# Args passed to the container entrypoint. Used to tell whoami which port to
# bind, matching containerPort above.
args:
  - --port
  - "8080"

service:
  type: ClusterIP
  port: 80

# Required by the Kyverno require-resource-limits policy.
# Your overlays may scale these but must not remove them.
resources:
  limits:
    cpu: 200m
    memory: 64Mi
  requests:
    cpu: 50m
    memory: 32Mi

# Non-root by default. App runs on containerPort 8080, so no NET_BIND_SERVICE needed.
securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# If your ExternalSecret produces a Secret with this name, the pod will mount
# it as env vars. Leave empty to disable.
envFromSecret: ""

# Liveness / readiness probes. The whoami image listens on port 80.
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 2
  periodSeconds: 5

# Optional pod / container labels
labels: {}

# Optional nodeSelector / tolerations / affinity
nodeSelector: {}
tolerations: []
affinity: {}
